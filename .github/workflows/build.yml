name: Build desktop installers

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "site/**"
      - ".github/workflows/pages.yml"
      - "README.md"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact: activitymux-windows-x64
            bundles: nsis,msi
            paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - name: Linux x64
            os: ubuntu-22.04
            artifact: activitymux-linux-x64
            bundles: appimage,deb
            paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: npm ci
      - name: Build installers
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download generated installers
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Package Windows tester bundle
        run: |
          version="${GITHUB_REF_NAME#v}"
          zip -j "release-artifacts/ActivityMux-${version}-windows-x64.zip" \
            release-artifacts/activitymux-windows-x64/nsis/*.exe \
            release-artifacts/activitymux-windows-x64/msi/*.msi
      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          sha256sum \
            activitymux-windows-x64/nsis/*.exe \
            activitymux-windows-x64/msi/*.msi \
            activitymux-linux-x64/appimage/*.AppImage \
            activitymux-linux-x64/deb/*.deb \
            ActivityMux-*-windows-x64.zip > SHA256SUMS.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-artifacts/activitymux-windows-x64/nsis/*.exe \
            release-artifacts/activitymux-windows-x64/msi/*.msi \
            release-artifacts/activitymux-linux-x64/appimage/*.AppImage \
            release-artifacts/activitymux-linux-x64/deb/*.deb \
            release-artifacts/ActivityMux-*-windows-x64.zip \
            release-artifacts/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "ActivityMux ${GITHUB_REF_NAME#v}"
